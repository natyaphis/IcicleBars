name: Package Addon

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare package folder
        run: |
          rm -rf package
          mkdir -p package
          cp -r . package/IcicleBars

      - name: Create zip
        run: |
          cd package
          zip -r "../IcicleBars-${{ github.event.release.tag_name }}.zip" IcicleBars \
            -x "IcicleBars/.git/*" \
            -x "IcicleBars/.github/*" \
            -x "IcicleBars/.vscode/*" \
            -x "IcicleBars/.gitignore" \
            -x "IcicleBars/.gitattributes"

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: IcicleBars-${{ github.event.release.tag_name }}.zip
          